<div class="flex h-screen w-full overflow-hidden bg-white font-['Lato',sans-serif] text-[#1A1C1D]">

    <!-- LEFT SIDEBAR -->
    <div
        class="w-full md:w-[498px] lg:w-[380px] xl:w-[636px] border-r border-[#F0F0F5] h-screen flex flex-col bg-[#F9F9FC] flex-shrink-0">

        <!-- Top Header Navigation -->
        <div class="p-4 px-6 border-b border-[#F0F0F5] flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button class="text-[#8083A3] hover:text-[#1A1C1D]">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
                <h2 class="text-[18px] font-bold text-[#1A1C1D]">Contacts</h2>
            </div>
            <div class="flex items-center gap-2">
                <button
                    class="w-8 h-8 flex items-center justify-center bg-white border border-[#EAEAEE] rounded-lg text-[#8083A3]"><svg
                        class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7">
                        </path>
                    </svg></button>
                <button
                    class="w-8 h-8 flex items-center justify-center bg-white border border-[#EAEAEE] rounded-lg text-[#8083A3]"><svg
                        class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg></button>
            </div>
        </div>

        <!-- Search Input Bar -->
        <div class="p-5 pb-3">
            <span class="text-[11px] text-[#8083A3] block mb-1">Search for a contact</span>
            <div class="relative flex items-center justify-between border-b border-[#1A1C1D] pb-1">
                <input type="text" placeholder="Name, email or phone number" (input)="onSearch($event)"
                    class="w-full bg-transparent text-[14px] text-[#1A1C1D] placeholder-[#1A1C1D] focus:outline-none font-normal" />
                <svg class="w-4 h-4 text-[#1A1C1D] flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </div>
        </div>

        <!-- Contact List Items -->
        <div class="flex-1 overflow-y-auto space-y-1 py-2">
            <a *ngFor="let item of filteredContacts" [routerLink]="['/contacts', item.id]"
                routerLinkActive="bg-[#EFEBFF]"
                class="flex items-center justify-between p-3.5 px-6 cursor-pointer hover:bg-[#F2F2F7] transition-all group relative">
                <div class="flex items-center gap-3.5 min-w-0">
                    <div class="relative flex-shrink-0">
                        <img [src]="item.avatar" [alt]="item.firstName" class="w-10 h-10 rounded-full object-cover" />
                        <span
                            class="absolute bottom-0 right-0 w-2.5 h-2.5 rounded-full border-2 border-white bg-[#4CD964]"></span>
                    </div>
                    <div class="min-w-0">
                        <div class="text-[14px] font-bold text-[#1A1C1D] truncate leading-[21px]">{{ item.firstName }}
                            {{ item.lastName }}</div>
                        <div class="text-[12px] text-[#8083A3] truncate mt-0.5 font-normal">{{ item.role || 'Developer'
                            }}</div>
                    </div>
                </div>

                <!-- 120x36 Action Buttons Container -->
                <div class="flex items-center gap-1.5 w-[120px] h-[36px] justify-end flex-shrink-0">
                    <button
                        class="w-9 h-9 flex items-center justify-center bg-white rounded-xl text-[#8083A3] hover:text-[#6B59CC] shadow-2xs"><svg
                            class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                            <path
                                d="M2 5a2 2 0 012-2h12a2 2 0 012 2v10a2 2 0 01-2 2H4a2 2 0 01-2-2V5zm3.293 1.293a1 1 0 011.414 0l3.293 3.293 3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z">
                            </path>
                        </svg></button>
                    <button
                        class="w-9 h-9 flex items-center justify-center bg-white rounded-xl text-[#8083A3] hover:text-[#6B59CC] shadow-2xs"><svg
                            class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z">
                            </path>
                        </svg></button>
                    <button
                        class="w-9 h-9 flex items-center justify-center bg-white rounded-xl text-[#8083A3] hover:text-[#6B59CC] shadow-2xs"><svg
                            class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M5 12h.01M12 12h.01M19 12h.01M6 12a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0zm7 0a1 1 0 11-2 0 1 1 0 012 0z">
                            </path>
                        </svg></button>
                </div>
            </a>
        </div>
    </div>

    <!-- RIGHT DETAILS SECTION -->
    <div class="flex-1 h-screen overflow-hidden bg-white">
        <router-outlet></router-outlet>
    </div>
</div>
