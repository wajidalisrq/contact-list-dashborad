<div class="flex h-screen w-full overflow-hidden bg-white font-['Lato',sans-serif] text-[#1A1C1D]">

    <!-- LEFT SIDEBAR (With Smooth Width Transition) -->
    <div [ngClass]="isSidebarCollapsed ? 'w-[90px]' : 'w-full md:w-[498px] lg:w-[380px] xl:w-[636px]'"
        class="border-r border-[#F0F0F5] h-screen flex flex-col bg-[#F9F9FC] flex-shrink-0 transition-all duration-300 ease-in-out overflow-hidden">

        <!-- Top Header Navigation -->
        <div class="p-4 border-b border-[#F0F0F5] flex items-center transition-all duration-300"
            [ngClass]="isSidebarCollapsed ? 'justify-center px-0' : 'justify-between px-6'">

            <div class="flex items-center gap-3">
                <!-- Hamburger Menu Icon -->
                <button (click)="isSidebarCollapsed = !isSidebarCollapsed" title="Toggle Sidebar"
                    class="w-9 h-9 flex items-center justify-center bg-white border border-[#EAEAEE] rounded-[10px] text-[#8083A3] hover:text-[#1A1C1D] shadow-[0_2px_6px_rgba(0,0,0,0.03)] transition-all cursor-pointer flex-shrink-0">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
                <!-- Contacts Title -->
                <h2 *ngIf="!isSidebarCollapsed" class="text-[18px] font-bold text-[#1A1C1D] whitespace-nowrap">
                    Contacts
                </h2>
            </div>

            <!-- BOTH Arrow Buttons (Left and Right) -->
            <div *ngIf="!isSidebarCollapsed" class="flex items-center gap-2">
                <button (click)="isSidebarCollapsed = true"
                    class="w-8 h-8 flex items-center justify-center bg-white border border-[#EAEAEE] rounded-lg text-[#8083A3] hover:text-[#1A1C1D] transition-colors shadow-sm cursor-pointer flex-shrink-0">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7">
                        </path>
                    </svg>
                </button>

                <button (click)="isSidebarCollapsed = false"
                    class="w-8 h-8 flex items-center justify-center bg-white border border-[#EAEAEE] rounded-lg text-[#8083A3] hover:text-[#1A1C1D] transition-colors shadow-sm cursor-pointer flex-shrink-0">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Search Input Bar -->
        <div *ngIf="!isSidebarCollapsed" class="p-5 pb-3">
            <span class="text-[11px] text-[#8083A3] block mb-1">Search for a contact</span>
            <div class="relative flex items-center justify-between pb-1">
                <input type="text" placeholder="Name, email or phone number" (input)="onSearch($event)"
                    class="w-full bg-transparent text-[14px] text-[#1A1C1D] placeholder-[#1A1C1D] focus:outline-none font-normal" />
                <svg class="w-4 h-4 text-[#1A1C1D] flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </div>
        </div>

        <!-- Contact List Items -->
        <div class="flex-1 overflow-y-auto space-y-1 py-2 overflow-x-hidden">
            <a *ngFor="let item of filteredContacts" [routerLink]="['/contacts', item.id]"
                routerLinkActive="bg-[#EFEBFF] active-item"
                class="flex items-center p-3.5 cursor-pointer hover:bg-[#F2F2F7] transition-all group relative"
                [ngClass]="isSidebarCollapsed ? 'justify-center px-0' : 'justify-between px-6'">

                <div class="flex items-center gap-3.5 min-w-0">
                    <div class="relative flex-shrink-0">
                        <img [src]="item.avatar" [alt]="item.firstName"
                            class="w-[36px] h-[36px] rounded-[10px] object-cover" />
                        <span
                            class="absolute bottom-0 right-0 w-2.5 h-2.5 rounded-full border-2 border-white bg-[#4CD964]"></span>
                    </div>

                    <div *ngIf="!isSidebarCollapsed" class="min-w-0 whitespace-nowrap">
                        <div class="text-[14px] font-bold text-[#1A1C1D] truncate leading-[21px]">{{ item.firstName }}
                            {{ item.lastName }}</div>
                        <div class="text-[12px] text-[#8083A3] truncate mt-0.5 font-normal">{{ item.role || 'Developer'
                            }}</div>
                    </div>
                </div>

                <!-- ACTION BUTTONS BLOCK WITH DYNAMIC STATE COLORS -->
                <div *ngIf="!isSidebarCollapsed"
                    class="flex items-center gap-1.5 w-[120px] h-[36px] justify-end flex-shrink-0">

                    <!-- Message / Email Icon -->
                    <a [href]="'mailto:' + (item.firstName ? item.firstName.toLowerCase() + '@gmail.com' : '')"
                        (click)="$event.stopPropagation()" title="Send Email"
                        class="w-9 h-9 flex items-center justify-center bg-white text-[#8083A3] group-[.active-item]:bg-[#EFEBFF] group-[.active-item]:text-[#6B59CC] hover:bg-[#EFEBFF] hover:text-[#6B59CC] rounded-xl shadow-2xs transition-colors">
                        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg"
                            class="fill-current">
                            <path
                                d="M11.25 7.48828C11.25 7.69922 11.168 7.875 11.0039 8.01562C10.8633 8.15625 10.6875 8.22656 10.4766 8.22656H2.98828L0 11.25V0.738281C0 0.527344 0.0703125 0.351562 0.210938 0.210938C0.351562 0.0703125 0.527344 0 0.738281 0H10.4766C10.6875 0 10.8633 0.0703125 11.0039 0.210938C11.168 0.351562 11.25 0.527344 11.25 0.738281V7.48828ZM14.2383 2.98828C14.4492 2.98828 14.625 3.05859 14.7656 3.19922C14.9062 3.33984 14.9766 3.51562 14.9766 3.72656V14.9766L11.9883 11.9883H3.72656C3.51562 11.9883 3.33984 11.918 3.19922 11.7773C3.05859 11.6367 2.98828 11.4609 2.98828 11.25V9.73828H12.7266V2.98828H14.2383Z" />
                        </svg>
                    </a>

                    <!-- Phone Call Icon -->
                    <a [href]="'tel:' + (item.phone || '')" (click)="$event.stopPropagation()" title="Call Contact"
                        class="w-9 h-9 flex items-center justify-center bg-white text-[#8083A3] group-[.active-item]:bg-[#EFEBFF] group-[.active-item]:text-[#6B59CC] hover:bg-[#EFEBFF] hover:text-[#6B59CC] rounded-xl shadow-2xs transition-colors">
                        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg"
                            class="fill-current">
                            <path
                                d="M12.7617 9.28125C12.9727 9.28125 13.1484 9.35156 13.2891 9.49219C13.4297 9.63281 13.5 9.80859 13.5 10.0195V12.6211C13.5 13.207 13.2539 13.5 12.7617 13.5C9.26953 13.5 6.26953 12.2461 3.76172 9.73828C1.25391 7.23047 0 4.23047 0 0.738281C0 0.246094 0.292969 0 0.878906 0H3.48047C3.69141 0 3.86719 0.0703125 4.00781 0.210938C4.14844 0.351562 4.21875 0.527344 4.21875 0.738281C4.21875 1.65234 4.35938 2.53125 4.64062 3.375C4.73438 3.67969 4.67578 3.9375 4.46484 4.14844L3.02344 5.41406C4.10156 7.66406 5.82422 9.36328 8.19141 10.5117L9.35156 9.03516C9.49219 8.89453 9.66797 8.82422 9.87891 8.82422C9.99609 8.82422 10.0781 8.83594 10.125 8.85938C10.9688 9.14062 11.8477 9.28125 12.7617 9.28125Z" />
                        </svg>
                    </a>

                    <!-- More Action Icon -->
                    <button (click)="$event.stopPropagation()"
                        class="w-9 h-9 flex items-center justify-center bg-white text-[#8083A3] group-[.active-item]:bg-[#EFEBFF] group-[.active-item]:text-[#6B59CC] hover:bg-[#EFEBFF] hover:text-[#6B59CC] rounded-xl shadow-2xs transition-colors">
                        <svg width="13" height="4" viewBox="0 0 13 4" fill="none" xmlns="http://www.w3.org/2000/svg"
                            class="fill-current">
                            <path
                                d="M4.95703 0.457031C5.26172 0.152344 5.61328 0 6.01172 0C6.41016 0 6.76172 0.152344 7.06641 0.457031C7.37109 0.761719 7.52344 1.11328 7.52344 1.51172C7.52344 1.91016 7.37109 2.26172 7.06641 2.56641C6.76172 2.87109 6.41016 3.02344 6.01172 3.02344C5.61328 3.02344 5.26172 2.87109 4.95703 2.56641C4.65234 2.26172 4.5 1.91016 4.5 1.51172C4.5 1.11328 4.65234 0.761719 4.95703 0.457031ZM9.45703 0.457031C9.76172 0.152344 10.1133 0 10.5117 0C10.9102 0 11.2617 0.152344 11.5664 0.457031C11.8711 0.761719 12.0234 1.11328 12.0234 1.51172C12.0234 1.91016 11.8711 2.26172 11.5664 2.56641C11.2617 2.87109 10.9102 3.02344 10.5117 3.02344C10.1133 3.02344 9.76172 2.87109 9.45703 2.56641C9.15234 2.26172 9 1.91016 9 1.51172C9 1.11328 9.15234 0.761719 9.45703 0.457031ZM0.457031 0.457031C0.761719 0.152344 1.11328 0 1.51172 0C1.91016 0 2.26172 0.152344 2.56641 0.457031C2.87109 0.761719 3.02344 1.11328 3.02344 1.51172C3.02344 1.91016 2.87109 2.26172 2.56641 2.56641C2.26172 2.87109 1.91016 3.02344 1.51172 3.02344C1.11328 3.02344 0.761719 2.87109 0.457031 2.56641C0.152344 2.26172 0 1.91016 0 1.51172C0 1.11328 0.152344 0.761719 0.457031 0.457031Z" />
                        </svg>
                    </button>
                </div>
            </a>
        </div>
    </div>

    <!-- RIGHT DETAILS SECTION -->
    <div class="flex-1 h-screen overflow-hidden bg-white relative">
        <router-outlet></router-outlet>
    </div>
</div>
